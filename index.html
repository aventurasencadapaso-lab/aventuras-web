<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AVENTURAS EN CADA PASO</title>

<link rel="icon" href="logo-aventuras.png">

<style>

/* RESET */

* {
margin: 0;
padding: 0;
box-sizing: border-box;
}

html {
scroll-behavior: smooth;

width: 100%;
height: 100%;

margin: 0;
padding: 0;

}

/* BODY */

body {

overflow-x: hidden;
overflow-y: auto;

background-image: linear-gradient(
rgba(255,255,255,0.93),
rgba(255,255,255,0.93)
),
url("fondo-aventuras.jpg");

background-size: cover;
background-position: center;
background-repeat: no-repeat;
background-attachment: fixed;

}

/* BARRA SUPERIOR */

.barra-superior {

position: fixed;
top: 0;
left: 0;

width: 100%;
height: 35px;

background-color: #2f2f2f;

display: flex;
align-items: center;

padding: 0 15px;

z-index: 9999;

}

.menu-btn {

font-size: 22px;
color: white;
cursor: pointer;

}

/* LOGO */

.logo-banner {

margin-top: 35px;
background: black;
text-align: center;

}

.logo-banner img {

width: 500px;

max-width: 90%;

display: block;

margin: auto;

position: relative;

animation: entrarLogo 2s ease-out forwards;

}

/* HEADER (BANDERA) */

header {

background-image: linear-gradient(
rgba(0,0,0,0.4),
rgba(0,0,0,0.4)
),
url("imagenes-bandera-canarias.png");

background-size: cover;
background-position: center;

color: white;
text-align: center;

padding: 170px 20px 20px 20px;

}

/* BANNER HORIZONTAL */

.banner-horizontal {

width: 100%;
margin: 0;
padding:  140px 20px 0px 20px;;

}

.banner-horizontal img {

width: 100%;

height: 800px;   /* CAMBIA ESTE TAMAÑO */

object-fit: contain;

display: block;

}

/* SECCIONES */

section {

padding: 60px 20px;
max-width: 1000px;
margin: auto;

}

h2 {

margin-bottom: 20px;
text-align: center;

}

/* TARJETAS */

.projects {

display: grid;

grid-template-columns:
repeat(auto-fit, minmax(250px,1fr));

gap: 20px;

justify-items: center;

}

.card {

background: #dcdcdc;

padding: 20px;

border-radius: 15px;

text-align: center;

max-width: 300px;

}

.imagen-menu {

width: 100%;

border-radius: 10px;

margin-top: 20px;

}

/* FORMULARIO */

form {

display: flex;
flex-direction: column;

}

input,
textarea {

padding: 10px;
margin-bottom: 10px;

border-radius: 5px;
border: 1px solid #ccc;

}

button {

padding: 12px;

background: #27ae60;

color: white;

border: none;

border-radius: 5px;

cursor: pointer;

}

/* FOOTER */

footer {

background: #333;
color: white;

text-align: center;

padding: 20px;

margin-top: 40px;

}

/* MENÚ LATERAL */

.menu-lateral {

position: fixed;

top: 35px;

left: -250px;

width: 250px;

height: 100%;

background-color: #2f2f2f;

padding-top: 20px;

transition: left 0.3s;

z-index: 9998;

}

.menu-lateral.abierto {

left: 0;

}

.menu-lateral a {

display: block;

color: white;

padding: 15px 20px;

text-decoration: none;

font-weight: bold;

}

.menu-lateral a:hover {

background-color: #444;

}

/* RESPONSIVE MÓVIL */

@media (max-width: 768px) {

/* Ocultar banner lateral si lo usas */

.banner-publicidad {

display: none;

}

/* Banner horizontal más pequeño */

.banner-horizontal img {

height: 60px;

}

/* Título más pequeño */

header h1 {

font-size: 2rem;

}

}

@keyframes entrarLogo {

0% {

transform: translateX(100vw);

opacity: 0;

}

100% {

transform: translateX(0);

opacity: 1;


}

}

</style>

</head>
<script>

function abrirMenu() {

let menu =
document.getElementById("menu-lateral");

menu.classList.toggle("abierto");

}

function cerrarMenu() {

let menu =
document.getElementById("menu-lateral");

menu.classList.remove("abierto");


}

</script>

<!-- MATTER JS -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>

<script>
const {
    Engine,
    Runner,
    Bodies,
    Composite,
    Mouse,
    MouseConstraint
} = Matter;

const engine = Engine.create();

engine.gravity.y = 0;

const world = engine.world;

const elementos = document.querySelectorAll(
    ".card"
);

const cuerpos = [];

elementos.forEach((el) => {

    const rect = el.getBoundingClientRect();
el.style.position = "fixed";
el.style.zIndex = "9999";

    el.style.left = rect.left + "px";
    el.style.top = rect.top + "px";

    el.style.margin = 0;

const body = Bodies.rectangle(
    rect.left + rect.width / 2,
    rect.top + rect.height / 2,
    rect.width,
    rect.height,
    {
        restitution: 0.9,
        friction: 0.001,
        density: 0.001
        }
    );

    cuerpos.push({
        html: el,
        body: body
    });

    Composite.add(world, body);
});

const suelo = Bodies.rectangle(
    window.innerWidth / 2,
    window.innerHeight - 20,
    window.innerWidth,
    40,
    {
        isStatic: true,
        render: {
            visible: false
    }
);

Composite.add(world, suelo);

const paredIzq = Bodies.rectangle(
    -50,
    window.innerHeight / 2,
    100,
    window.innerHeight * 5,
    { isStatic: true }
);

const paredDer = Bodies.rectangle(
    window.innerWidth + 50,
    window.innerHeight / 2,
    100,
    window.innerHeight * 5,
    { isStatic: true }
);

Composite.add(world, [paredIzq, paredDer]);

const mouse = Mouse.create(document.body);

const mouseConstraint = MouseConstraint.create(engine, {
    mouse: mouse,
    constraint: {
        stiffness: 0.2
    }
});

Composite.add(world, mouseConstraint);

Runner.run(Runner.create(), engine);
Engine.update(engine);

(function actualizar() {

    cuerpos.forEach(obj => {

        const pos = obj.body.position;
        const angle = obj.body.angle;

        obj.html.style.left =
            (pos.x - obj.html.offsetWidth / 2) + "px";

        obj.html.style.top =
            (pos.y - obj.html.offsetHeight / 2) + "px";

        obj.html.style.transform =
            `rotate(${angle}rad)`;

    });

    requestAnimationFrame(actualizar);
}

actualizar();

const activar = document.createElement("button");

activar.innerText = "ACTIVAR ANTIGRAVITY";

activar.style.position = "fixed";
activar.style.bottom = "20px";
activar.style.right = "20px";
activar.style.zIndex = "999999";
activar.style.padding = "15px";

document.body.appendChild(activar);

let activo = false;

activar.onclick = () => {

    if (!activo) {

        engine.gravity.y = 1;

        activar.innerText = "ANTIGRAVITY ACTIVADO";

        activo = true;

    } else {

        engine.gravity.y = 1;

        activar.innerText = "ACTIVAR ANTIGRAVITY";

        activo = false;

    }

};


</script>
<!-- CHAT SIMPLE -->

<div id="chat-btn">💬</div>

<div id="chat-box">

<div id="chat-mensajes"></div>

<input id="chat-input" type="text">

<button onclick="responderChat()">
Enviar
</button>

</div>

<style>

#chat-btn {

position: fixed;
bottom: 20px;
right: 20px;

width: 60px;
height: 60px;

background: green;
color: white;

border-radius: 50%;

display: flex;
align-items: center;
justify-content: center;

font-size: 30px;

cursor: pointer;

z-index: 999999;

}

#chat-box {

position: fixed;

bottom: 90px;
right: 20px;

width: 300px;

background: white;

border: 2px solid black;

padding: 10px;

display: none;

z-index: 999999;

}

#chat-mensajes {

height: 200px;

overflow-y: auto;

margin-bottom: 10px;

}



</style>

<script>

const chatBtn =
document.getElementById("chat-btn");

const chatBox =
document.getElementById("chat-box");

chatBtn.onclick = () => {

if(chatBox.style.display == "block") {

chatBox.style.display = "none";

} else {

chatBox.style.display = "block";

}

};

function responderChat() {

let input =
document.getElementById("chat-input");

let texto = input.value;

let mensajes =
document.getElementById("chat-mensajes");

mensajes.innerHTML +=
"<p><b>Tú:</b> " + texto + "</p>";

let respuesta = "No entiendo";

if(texto.includes("hola")) {

respuesta = "Hola aventurero";

}

if(texto.includes("senderismo")) {

respuesta = "Tenemos rutas increíbles";

}

mensajes.innerHTML +=
"<p><b>Bot:</b> " + respuesta + "</p>";

input.value = "";

}

</script>

</body>
