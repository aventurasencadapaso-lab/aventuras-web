<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AVENTURAS EN CADA PASO</title>

<link rel="icon" href="logo-aventuras.png">

<style>

/* RESET */

* {
margin: 0;
padding: 0;
box-sizing: border-box;
}

html {
scroll-behavior: smooth;

width: 100%;
height: 100%;

margin: 0;
padding: 0;

}

/* BODY */

body {

background: #050b14;

color: white;

font-family: Arial, sans-serif;

overflow-x: hidden;

}

/* BARRA SUPERIOR */

.barra-superior {

position: fixed;

top: 0;
left: 0;

width: 100%;
height: 80px;

background: rgba(0,0,0,0.85);

backdrop-filter: blur(10px);

border-bottom: 1px solid #1cff6b;

display: flex;
align-items: center;
justify-content: space-between;

padding: 0 40px;

z-index: 9999;

}

.menu-btn {

font-size: 22px;
color: white;
cursor: pointer;

}

/* LOGO */

.logo-banner {

margin-top: 35px;
background: black;
text-align: center;

}

.logo-banner img {

width: 500px;

max-width: 90%;

display: block;

margin: auto;

position: relative;

animation: entrarLogo 2s ease-out forwards;

}

/* HEADER (BANDERA) */

header {

background-image: linear-gradient(
rgba(0,0,0,0.4),
rgba(0,0,0,0.4)
),
url("imagenes-bandera-canarias.png");

background-size: cover;
background-position: center;

color: white;
text-align: center;

padding: 170px 20px 20px 20px;

}

/* BANNER HORIZONTAL */

.banner-horizontal {

width: 100%;
margin: 0;
padding:  140px 20px 0px 20px;;

}

.banner-horizontal img {

width: 100%;

height: 800px;   /* CAMBIA ESTE TAMAÑO */

object-fit: contain;

display: block;

}

/* SECCIONES */

section {

padding: 60px 20px;
max-width: 1000px;
margin: auto;

}

h2 {

margin-bottom: 20px;
text-align: center;

}

/* TARJETAS */

.projects {

display: grid;

grid-template-columns:
repeat(auto-fit, minmax(250px,1fr));

gap: 20px;

justify-items: center;

}

.card {

background: #0c1624;

border: 1px solid #1cff6b;

border-radius: 20px;

overflow: hidden;

padding: 15px;

transition: 0.3s;

box-shadow: 0 0 20px rgba(0,255,100,0.15);

max-width: 340px;

}

.card:hover {

transform: translateY(-10px);

box-shadow: 0 0 25px rgba(0,255,100,0.4);

}

.imagen-menu {

width: 100%;
height: 220px;

object-fit: cover;

border-radius: 15px;

margin-top: 15px;

}

/* FORMULARIO */

form {

display: flex;
flex-direction: column;

}

input,
textarea {

padding: 10px;
margin-bottom: 10px;

border-radius: 5px;
border: 1px solid #ccc;

}

button {

padding: 12px 25px;

background: transparent;

border: 1px solid #1cff6b;

color: #1cff6b;

border-radius: 10px;

cursor: pointer;

transition: 0.3s;

font-weight: bold;

}

button:hover {

background: #1cff6b;

color: black;

}

/* FOOTER */

footer {

background: #333;
color: white;

text-align: center;

padding: 20px;

margin-top: 40px;

}

/* MENÚ LATERAL */

.menu-lateral {

position: fixed;

top: 35px;

left: -250px;

width: 250px;

height: 100%;

background-color: #2f2f2f;

padding-top: 20px;

transition: left 0.3s;

z-index: 9998;

}

.menu-lateral.abierto {

left: 0;

}

.menu-lateral a {

display: block;

color: white;

padding: 15px 20px;

text-decoration: none;

font-weight: bold;

}

.menu-lateral a:hover {

background-color: #444;

}

/* RESPONSIVE MÓVIL */

@media (max-width: 768px) {

/* Ocultar banner lateral si lo usas */

.banner-publicidad {

display: none;

}

/* Banner horizontal más pequeño */

.banner-horizontal img {

height: 60px;

}

/* Título más pequeño */

header h1 {

font-size: 2rem;

}

}

@keyframes entrarLogo {

0% {

transform: translateX(100vw);

opacity: 0;

}

100% {

transform: translateX(0);

opacity: 1;


}

}



h1 {

font-size: 4rem;

font-weight: 900;

color: white;

text-transform: uppercase;

letter-spacing: 2px;

}

h2 {

color: #1cff6b;

text-transform: uppercase;

margin-bottom: 25px;

}

.card h3 {

color: #1cff6b;

margin-top: 15px;

}

p {

color: #cfd8dc;

line-height: 1.7;

}

.epic-section {

padding: 100px 20px;

max-width: 1200px;

margin: auto;

}

.epic-title {

font-size: 5rem;

text-align: center;

color: white;

text-transform: uppercase;

margin-bottom: 10px;

text-shadow: 0 0 20px #1cff6b;

}

.epic-subtitle {

text-align: center;

font-size: 1.5rem;

color: #1cff6b;

margin-bottom: 50px;

}

.epic-box {

background: #0c1624;

border: 1px solid #1cff6b;

border-radius: 20px;

padding: 30px;

margin-bottom: 40px;

box-shadow: 0 0 20px rgba(0,255,100,0.15);

}

.epic-grid {

display: grid;

grid-template-columns:
repeat(3, 1fr);

gap: 20px;

align-items: stretch;

}

}

.epic-card {

background: #0c1624;

border: 1px solid #1cff6b;

border-radius: 20px;

padding: 25px;

transition: 0.3s;

min-height: 280px;

}

.epic-card:hover {

transform: translateY(-10px);

box-shadow: 0 0 25px rgba(0,255,100,0.4);

}

.epic-card h3 {

color: #1cff6b;

margin-bottom: 20px;

}

.epic-card ul {

list-style: none;

padding: 0;

}

.epic-card li {

padding: 8px 0;

border-bottom: 1px solid rgba(255,255,255,0.08);

}

.epic-list {

margin-top: 20px;

padding-left: 20px;

}

.epic-final {

text-align: center;

padding: 60px 20px;

}

.frase-final {

font-size: 2rem;

color: #1cff6b;

margin-top: 30px;

font-weight: bold;

line-height: 1.5;

text-shadow: 0 0 15px #1cff6b;

}
.share-menu {

position: relative;

}

.share-btn {


background: transparent;

border: 1px solid #1cff6b;

color: #1cff6b;

padding: 10px 20px;

border-radius: 10px;

cursor: pointer;

}

.share-links {

display: none;

position: absolute;

top: 50px;
right: 0;

background: #0c1624;

border: 1px solid #1cff6b;

border-radius: 15px;

padding: 10px;

min-width: 200px;

z-index: 999999;

}

.share-links a {

display: block;

color: white;

padding: 10px;

text-decoration: none;

border-radius: 10px;

transition: 0.3s;

}

.share-links a:hover {

background: rgba(0,255,100,0.2);

}

.share-menu:hover .share-links {

display: block;

}

@media (max-width: 900px) {

.epic-grid {

grid-template-columns: 1fr;


}

</style>

</head>
<script>

function abrirMenu() {

let menu =
document.getElementById("menu-lateral");

menu.classList.toggle("abierto");

}

function cerrarMenu() {

let menu =
document.getElementById("menu-lateral");

menu.classList.remove("abierto");


}


</script>

<body>

<!-- BARRA SUPERIOR -->

<div class="barra-superior">

<div class="menu-btn" onclick="abrirMenu()">
☰
</div>
<!-- MENÚ LATERAL -->

<div id="menu-lateral" class="menu-lateral">

<a href="index.html" onclick="cerrarMenu()">

</a>

<a href="quienessomos.html" onclick="cerrarMenu()">
Quiénes somos
</a>

<a href="aventuras.html" onclick="cerrarMenu()">
Aventuras
</a>

<a href="contacto.html" onclick="cerrarMenu()">
Contacto
</a>

</div>
<div class="share-menu">

<button class="share-btn">

⤴

</button>

<div class="share-links">

<a
href="https://wa.me/?text=https://TUWEB.com"
target="_blank">

WhatsApp

</a>

<a
href="https://www.facebook.com/sharer/sharer.php?u=https://aventurasencadapaso-lab.github.io/aventuras-web/#aventuras
target="_blank">

<a
href="https://twitter.com/intent/tweet?url=https://aventurasencadapaso-lab.github.io/aventuras-web/#aventuras

</a>

<a
href="https://www.linkedin.com/sharing/share-offsite/?url=https://aventurasencadapaso-lab.github.io/aventuras-web/#aventuras"
target="_blank">

LinkedIn

</a>

</div>
</div>

</div>

<!-- LOGO -->

<div class="logo-banner">

<a href="index.html" onclick="cerrarMenu()">
<img src="logo-aventuras.png" alt="Logo">
</a>

</div>

<!-- CONTACTO -->

<section id="contacto">

<h2>CONTACTO</h2>

<form
action="https://formsubmit.co/aventurasencadapaso@gmail.com"

<footer>

<p>© 2026 Aventuras en cada paso</p>

</footer>


<!-- CHAT SIMPLE -->

<div id="chat-btn">💬</div>

<div id="chat-box">

<div id="chat-mensajes"></div>

<input id="chat-input" type="text">

<button onclick="responderChat()">
Enviar
</button>

</div>

<style>

#chat-btn {

position: fixed;
bottom: 20px;
right: 20px;

width: 60px;
height: 60px;

background: green;
color: white;

border-radius: 50%;

display: flex;
align-items: center;
justify-content: center;

font-size: 30px;

cursor: pointer;

z-index: 999999;

}

#chat-box {

position: fixed;

bottom: 90px;
right: 20px;

width: 300px;

background: white;

border: 2px solid black;

padding: 10px;

display: none;

z-index: 999999;

}

#chat-mensajes {

height: 200px;

overflow-y: auto;

margin-bottom: 10px;

}



</style>

<script>

const chatBtn =
document.getElementById("chat-btn");

const chatBox =
document.getElementById("chat-box");

chatBtn.onclick = () => {

if(chatBox.style.display == "block") {

chatBox.style.display = "none";

} else {

chatBox.style.display = "block";

}

};

function responderChat() {

let input =
document.getElementById("chat-input");

let texto = input.value;

let mensajes =
document.getElementById("chat-mensajes");

mensajes.innerHTML +=
"<p><b>Tú:</b> " + texto + "</p>";

let respuesta = "No entiendo";

if(texto.includes("hola")) {

respuesta = "Hola aventurero";

}

if(texto.includes("senderismo")) {

respuesta = "Tenemos rutas increíbles";

}

mensajes.innerHTML +=
"<p><b>Bot:</b> " + respuesta + "</p>";

input.value = "";

}

</script>

</body>

</html>
